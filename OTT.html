<!DOCTYPE html>
<html>
     <head>
        <title>Audio Effects: OTT</title>
        <meta name = "viewport" content = "width=device-width, initial-scale = 1.0">
    </head>
    <link rel="stylesheet" href="audioTest.css">

    <div class="navBar">
        <div>
            <button class="openbtn">&#8801;</button>
        </div>
        <ul>
            <li><a href="audioTest.html">erosion</a></li>
            <li><a href="OTT.html" class="active">ott</a></li>
        </ul>
    </div>

    <div id="mySidebar" class="sidebar">
        <a href="index.html">about</a>
        <a href="audioTest.html" class="sideActive">effects</a>
        <a href="projects.html">projects</a>
        <a href="omnichord.html">auto chord</a>
    </div>

    <svg width="0" height="0" style="position: absolute;">
        <filter id="noiseFilt">
            <feTurbulence type="fractalNoise" baseFrequency=".8" />
            <feColorMatrix type='saturate' values='0' />
            <feBlend in='SourceGraphic' mode='soft-light' />
        </filter>
    </svg>
    
    <div class="sliderBody">
        <button class="bypass-button" id="bypass-button">-</button>
        <div class="three-slider">
            <div class="meter-container">
                <span class="upper-label">more upward compression</span>
                <input type="range" class="thumb-only-slider" id="low-slider" min="0" max="2" value="1" step="0.005">
                <div id="low-meter" class="meter-fill"></div>
                <div class="slider-info">
                    <span class="slider-label">low</span>
                </div>
                <span class="lower-label">more downward compression</span>
            </div>
            <div class="meter-container">
                <span class="upper-label">more upward compression</span>
                <input type="range" class="thumb-only-slider" id="mid-slider" min="0" max="2" value="1" step="0.005">
                <div id="mid-meter" class="meter-fill"></div>
                <div class="slider-info">
                    <span class="slider-label">mid</span>
                </div>
                <span class="lower-label">more downward compression</span>
            </div>
            <div class="meter-container">
                <span class="upper-label">more upward compression</span>
                <input type="range" class="thumb-only-slider" id="high-slider" min="0" max="2" value="1" step="0.005">
                <div id="high-meter" class="meter-fill"></div>
                <div class="slider-info">
                    <span class="slider-label">high</span>
                </div>
                <span class="lower-label">more downward compression</span>
            </div>
        </div>
    </div>

    <script type="module">
        const audioContext = new AudioContext();
        await audioContext.audioWorklet.addModule("upward-compressor-processor.js");
        const loopStart = 13.646;
        const loopEnd = 27.35;

        let sourceNode;
        let audioBuffer;

        async function loadAudio() {
            const response = await fetch("https://raw.githubusercontent.com/jackbartusch/audioTest/main/kick_loop.mp3");
            const arrayBuffer = await response.arrayBuffer();
            audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
            console.log("Audio Loaded and Decoded");
        }

        loadAudio();

        function startLoop(){
            sourceNode = audioContext.createBufferSource();
            sourceNode.buffer = audioBuffer;

            sourceNode.loop = true;
            sourceNode.loopStart = loopStart;
            sourceNode.loopEnd = loopEnd;

            sourceNode.connect(inputGainNode);

            sourceNode.start(0, 0);
        }

        function lin2Db(linVal){
            if (Math.abs(linVal < 0.001)){
                return -100;
            }
            else{
                return 20 * Math.log10(Math.abs(linVal));
            }
        }

        function drawVolume(){
            requestAnimationFrame(drawVolume); //syncs with refresh rate
            
            highAnalyser.getByteTimeDomainData(highData);
            midAnalyser.getByteTimeDomainData(midData);
            lowAnalyser.getByteTimeDomainData(lowData);
            
            let highNorm = 0;
            let midNorm = 0;
            let lowNorm = 0;

            for (let i = 0; i < highData.length; i++){
                highNorm = Math.max(highNorm, (highData[i] / 128) - 1); //normalises 0:255 to -1:1
                midNorm = Math.max(midNorm, (midData[i] / 128) - 1);
                lowNorm = Math.max(lowNorm, (lowData[i] / 128) - 1);

                updateVisualMeter(highNorm, midNorm, lowNorm);
            }
        }

        function updateVisualMeter(high, mid, low){
            const highMeter = document.querySelector("#high-meter");
            const midMeter = document.querySelector("#mid-meter");
            const lowMeter = document.querySelector("#low-meter");

            let highDB = lin2Db(high);
            let midDB = lin2Db(mid);
            let lowDB = lin2Db(low);

            let highHeight =  highDB+98;
            highMeter.style.height = highHeight + "%";
            let midHeight =  midDB+98;
            midMeter.style.height = midHeight + "%";
            let lowHeight =  lowDB+98;
            lowMeter.style.height = lowHeight + "%";
        }

        let hasStarted = false;
        document.addEventListener("click", () => {
            if (audioContext.state === "suspended") {
                audioContext.resume();
            }

            if(!hasStarted)
            {
                startLoop();
                hasStarted = true;
            }
        });

        const inputGainNode = audioContext.createGain();
        const dryGainNode = audioContext.createGain();
        const wetGainNode = audioContext.createGain();
        const highNode = audioContext.createBiquadFilter();
        const midNodeUp = audioContext.createBiquadFilter();
        const midNodeLow = audioContext.createBiquadFilter();
        const lowNode = audioContext.createBiquadFilter();
        const highOut = audioContext.createGain();
        const midOut = audioContext.createGain();
        const lowOut = audioContext.createGain();
        const outGain = audioContext.createGain();

        const knee = 2;
        
        const highCompNode = new DynamicsCompressorNode(audioContext, 
            {attack: 0.0135, knee: knee, ratio: 20, release: 0.132, threshold: -35.5});
        const midCompNode = new DynamicsCompressorNode(audioContext, 
            {attack: 0.0224, knee: knee, ratio: 20, release: 0.282, threshold: -30.2});
        const lowCompNode = new DynamicsCompressorNode(audioContext, 
            {attack: 0.0478, knee: knee, ratio: 20, release: 0.282, threshold: -33.8});

        const highUpNode = new AudioWorkletNode(audioContext, "upward-compressor-processor");
        const midUpNode = new AudioWorkletNode(audioContext, "upward-compressor-processor");
        const lowUpNode = new AudioWorkletNode(audioContext, "upward-compressor-processor");

        const highAnalyser = audioContext.createAnalyser();
        const midAnalyser = audioContext.createAnalyser();
        const lowAnalyser = audioContext.createAnalyser();
        highAnalyser.fftSize = 256;
        midAnalyser.fftSize = 256;
        lowAnalyser.fftSize = 256;
        const bufferLength = lowAnalyser.frequencyBinCount;
        const highData = new Uint8Array(bufferLength);
        const midData = new Uint8Array(bufferLength);
        const lowData = new Uint8Array(bufferLength);

        highUpNode.parameters.get("threshold").value = -35.8;
        highUpNode.parameters.get("ratio").value = 4.17;
        highUpNode.parameters.get("attack").value = 0.0135;
        highUpNode.parameters.get("release").value = 0.132;
        highUpNode.parameters.get("knee").value = knee;

        midUpNode.parameters.get("threshold").value = -41.8;
        midUpNode.parameters.get("ratio").value = 4.17;
        midUpNode.parameters.get("attack").value = 0.0224;
        midUpNode.parameters.get("release").value = 0.282;
        midUpNode.parameters.get("knee").value = knee;

        lowUpNode.parameters.get("threshold").value = -40.8;
        lowUpNode.parameters.get("ratio").value = 4.17;
        lowUpNode.parameters.get("attack").value = 0.05;
        lowUpNode.parameters.get("release").value = 0.282;
        lowUpNode.parameters.get("knee").value = knee;

        inputGainNode.gain.value = 0.9;

        inputGainNode.connect(dryGainNode);
        inputGainNode.connect(highNode);
        inputGainNode.connect(midNodeLow);
        inputGainNode.connect(midNodeUp);
        inputGainNode.connect(lowNode);

        highNode.connect(highUpNode);
        midNodeUp.connect(midUpNode);
        midNodeLow.connect(midUpNode);
        lowNode.connect(lowUpNode);

        highUpNode.connect(highCompNode);
        midUpNode.connect(midCompNode);
        lowUpNode.connect(lowCompNode);

        highCompNode.connect(highOut);
        midCompNode.connect(midOut);
        lowCompNode.connect(lowOut);

        highOut.gain.value = 3.27;
        midOut.gain.value = 1.93;
        lowOut.gain.value = 3.27;
        

        highOut.connect(outGain);
        midOut.connect(outGain);
        lowOut.connect(outGain);
        highOut.connect(highAnalyser);
        midOut.connect(midAnalyser);
        lowOut.connect(lowAnalyser);
        drawVolume();

        outGain.gain.value = 0.5;
        outGain.connect(wetGainNode);

        const q = -15;

        highNode.type = "highpass"
        highNode.frequency.setValueAtTime(2500, audioContext.currentTime);
        highNode.Q.setValueAtTime(q, audioContext.currentTime);
        highNode.gain.value = 1.82;

        midNodeLow.type = "highpass"
        midNodeLow.frequency.setValueAtTime(124.831, audioContext.currentTime);
        midNodeLow.Q.setValueAtTime(q, audioContext.currentTime);
        midNodeLow.gain.value = 0.91;
        midNodeUp.type = "lowpass"
        midNodeUp.frequency.setValueAtTime(1768.4, audioContext.currentTime);
        midNodeUp.Q.setValueAtTime(q, audioContext.currentTime);
        midNodeUp.gain.value = 0.91;

        lowNode.type = "lowpass"
        lowNode.frequency.setValueAtTime(88.3, audioContext.currentTime);
        lowNode.Q.setValueAtTime(q, audioContext.currentTime);
        lowNode.gain.value = 1.82;

        dryGainNode.connect(audioContext.destination);
        wetGainNode.connect(audioContext.destination);  
        wetGainNode.gain.value = 1;
        dryGainNode.gain.value = 0;

        const bypassControl = document.querySelector("#bypass-button");

        let active = true;
        if(active) {
            bypassControl.textContent = "-";
            bypassControl.classList.add("active")
            bypassControl.classList.remove("bypassed")    
        }
        bypassControl.addEventListener("click", () => {
            if(active){
                wetGainNode.gain.linearRampToValueAtTime(0, audioContext.currentTime + 0.5);
                dryGainNode.gain.linearRampToValueAtTime(1, audioContext.currentTime + 0.5);
                highOut.disconnect(highAnalyser);
                highNode.connect(highAnalyser);
                midOut.disconnect(midAnalyser);
                midNodeLow.connect(midAnalyser);
                lowOut.disconnect(lowAnalyser);
                lowNode.connect(lowAnalyser);
                active = false;
                bypassControl.textContent = "+";
                bypassControl.classList.add("bypassed")
                bypassControl.classList.remove("active")
            }
            else{
                wetGainNode.gain.linearRampToValueAtTime(1, audioContext.currentTime + 0.5);
                dryGainNode.gain.linearRampToValueAtTime(0, audioContext.currentTime + 0.5);
                highOut.connect(highAnalyser);
                highNode.disconnect(highAnalyser);
                midOut.connect(midAnalyser);
                midNodeLow.disconnect(midAnalyser);
                lowOut.connect(lowAnalyser);
                lowNode.disconnect(lowAnalyser);
                active = true;
                bypassControl.textContent = "-";
                bypassControl.classList.add("active")
                bypassControl.classList.remove("bypassed")
            }
        });

        const lowControl = document.querySelector("#low-slider");
        lowControl.addEventListener("mousedown", () => {
            midOut.gain.value = 0;
            highOut.gain.value = 0;
        });
        lowControl.addEventListener("mouseup", () => {
            midOut.gain.value = 1.93;
            highOut.gain.value = 3.27;
        });
        lowControl.addEventListener("input", () => {
            lowCompNode.threshold.value = -33.8 * (2 - lowControl.value);
            lowUpNode.parameters.get("threshold").value = -40.8 * (2 - lowControl.value);
        });
        const midControl = document.querySelector("#mid-slider");
        midControl.addEventListener("mousedown", () => {
            lowOut.gain.value = 0;
            highOut.gain.value = 0;
        });
        midControl.addEventListener("mouseup", () => {
            lowOut.gain.value = 3.27;
            highOut.gain.value = 3.27;
        });
        midControl.addEventListener("input", () => {
            midCompNode.threshold.value = -35.5 * (2 - midControl.value);
            midUpNode.parameters.get("threshold").value = -41.8 * (2 - midControl.value);
        });
        const highControl = document.querySelector("#high-slider");
        highControl.addEventListener("mousedown", () => {
            lowOut.gain.value = 0;
            midOut.gain.value = 0;
        });
        highControl.addEventListener("mouseup", () => {
            lowOut.gain.value = 3.27;
            midOut.gain.value = 1.93;
        });
        highControl.addEventListener("input", () => {
            highCompNode.threshold.value = -33.8 * (2 - highControl.value);
            highUpNode.parameters.get("threshold").value = -35.8 * (2 - highControl.value);
        });

        let open = false;
        const openbtn = document.querySelector(".openbtn");
        openbtn.addEventListener("click", () => {
            open = !open;
            if(open){
                document.getElementById("mySidebar").style.transform = "translateX(0%)";
            }
            else{
                document.getElementById("mySidebar").style.transform = "translateX(-100%)";
            }
        })

    </script>
</html>
