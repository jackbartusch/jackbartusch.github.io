<!DOCTYPE html>
<html>
    <head>
        <title>omnichord test</title>
        <meta name = "viewport" content = "width=device-width, initial-scale = 1.0">
    </head>
    <link rel="stylesheet" href="omnichord.css">
    <body>
        <div id="topContainer" class="topContainer">
            <div id="chordContainer" class="chordContainer"></div>
            <div class="slider-container">
                <input type="range" id="voicing" min="0" max="1" value="0" step="0.01" class="vertical-slider"/>
                <div class="slider-info">
                    <span class="slider-label">voicing</span>
                    <output id="voiceVal" class="slider-label">triad</output>
                </div>
            </div>
        </div>
        <div id="keyboard" class="keyboard">
            <div id="accContainer" class="container"></div>
            <div id="natContainer" class="container"></div>
        </div>
    </body>

    <!-- ****************CHANGE FX NAVBAR***************** -->
    <div class="navBar">
        <div>
            <button class="openbtn">&#8801;</button>
        </div>
        <ul>
            <li><a href="erosion">erosion</a></li>
            <li><a href="OTT">ott</a></li>
            <li><a href="autoChord" class="active">auto chord</a></li>
        </ul>
    </div>
    <!-- ****************CHANGE FX NAVBAR***************** -->

    <!-- ****************CHANGE SIDE NAVBAR***************** -->
    <div id="mySidebar" class="sidebar">
        <a href="../index">about</a>
        <a href="/effects/autoChord" class="sideActive">effects</a>
        <a href="/projects/multieffects">projects</a>
    </div>
    <!-- ****************CHANGE SIDE NAVBAR***************** -->

    <script type="module">
        const natNotes = [
            {name: "c", freq: 261.63},
            {name: "c#", freq: 277.18},
            {name: "d", freq: 293.66},
            {name: "d#", freq: 311.13},
            {name: "e", freq: 329.63},
            {name: "f", freq: 349.23},
        ]

        const accNotes = [
            {name: "b", freq: 493.88},  
            {name: "a#", freq: 466.16},
            {name: "a", freq: 440},
            {name: "g#", freq: 415.3},
            {name: "g", freq: 392},
            {name: "f#", freq: 369.99}        
        ]

        import polyVoice, { voicings } from "./polyVoice.js";
        import updateSlider from "./slider.js";
        const synth = new polyVoice();
        const majButt = document.getElementById("maj");
        const minButt = document.getElementById("min");
        const natContainer = document.getElementById("natContainer");
        const chordContainer = document.getElementById("chordContainer");
        const chordKeys = Object.keys(voicings);
        const totalVoicings = 3;
        let baseChord = 'maj';
        let currChord = voicings.maj.first;
        let pointerDown = false;
        let globalX = 0;
        let globalY = 0;

        let voiceVal= 0;
        let currVoicing = 'first';
        let prevVoicing = 'first';
        let sliderDrag = false;
        let voicingSlider = document.getElementById('voicing');
        let currButton;

        keyboard.addEventListener('touchmove', (event) => {//all this is happening on a move
            event.preventDefault();
            for(let i = 0; i<event.touches.length; i++){
                let currX = event.touches[i].clientX;
                let currY = event.touches[i].clientY;
                let btn = document.elementFromPoint(currX, currY);
                if(!btn.classList.contains('playing')){
                    synth.startChord(btn.id, currChord);
                    btn.classList.add('playing');
                }
            }

            document.querySelectorAll('.playing').forEach(btn => {
                let check = null;
                for(let i = 0; i < event.touches.length; i++){
                    let touch = event.touches[i];
                    if(document.elementFromPoint(touch.clientX, touch.clientY) == btn){
                        check = document.elementFromPoint(touch.clientX, touch.clientY);
                    }
                }
                if(check == null){
                    synth.stopChord(btn.id, currChord);
                    btn.classList.remove('playing');
                }
            });

            /*
            let touch = event.touches[0]; //take most recent move
            let currX = touch.clientX;
            let currY = touch.clientY;
            let touchedButton = document.elementFromPoint(currX, currY);

            if(currButton != touchedButton){
                synth.stopChord(currButton.id, currChord);
                currButton.classList.remove('playing');
                currButton = touchedButton;
                synth.startChord(currButton.id, currChord);
                currButton.classList.add('playing');
            }
            */
        });

        keyboard.addEventListener('touchend', (event) => {
            event.preventDefault();
            if(event.touches.length == 0){// no touches left
                document.querySelectorAll('.noteButton').forEach(btn => {
                    if(btn.classList.contains('playing')){
                        synth.stopChord(btn.id, currChord);
                        btn.classList.remove('playing');
                    }
                });
            }
        });

        voicingSlider.addEventListener('pointerdown', (event) => {
            event.preventDefault();
            sliderDrag = true;
            voicingSlider.setPointerCapture(event.pointerId);
            updateSlider(event, voicingSlider);
            event.preventDefault();
            voiceVal = voicingSlider.value;

            updateVoicing();

            if(prevVoicing != currVoicing){
                changeVoicing();
                prevVoicing = currVoicing;
            }
        });

        voicingSlider.addEventListener('pointermove', (event) => {
            event.preventDefault();
            if(sliderDrag){
                updateSlider(event, voicingSlider);
                event.preventDefault();
                voiceVal = voicingSlider.value;
            }

            updateVoicing();

            if(prevVoicing != currVoicing){
                changeVoicing();
                prevVoicing = currVoicing;
            }
        });

        voicingSlider.addEventListener('pointerup', (event) => {
            event.preventDefault();
            sliderDrag = false;
            voicingSlider.releasePointerCapture(event.pointerId);
        });


        function buildKeyboard(notes, row){
            notes.forEach(note => {
                if(note.name == "spacer"){//spacer added
                    const spacer = document.createElement('div');
                    spacer.className = "spacer"

                    if(row == 'top'){
                    accContainer.appendChild(spacer);
                    }else{
                        natContainer.appendChild(spacer);
                    }
                    
                }else{//keyboard note added
                    const button = document.createElement('button');
                    button.innerText = note.name;
                    button.className = "noteButton";
                    button.id = note.freq;

                    const startPlaying = () => {
                        document.querySelectorAll('.noteButton').forEach(btn => {
                            currChord = voicings[baseChord][currVoicing] || voicings[baseChord].first;
                            if (btn.classList.contains('playing')){
                                btn.classList.remove('playing');
                                synth.stopChord(btn.id, synth.currChord);
                            }
                        });
                        synth.startChord(note.freq, currChord);
                        button.classList.add('playing');
                    }

                    button.addEventListener('touchmove', (event) => {
                        let currX = event.touches[0].clientX;
                        let currY = event.touches[0].clientY;

                        if(document.elementFromPoint(currX, currY) != button){
                            stopPlaying();
                        }
                    });

                    button.addEventListener('pointerdown', (event) => {
                        event.preventDefault();
                        currButton = button;
                        startPlaying();
                        pointerDown = true;
                    });

                    button.addEventListener('pointerenter', (event) => {
                        event.preventDefault();
                        if(pointerDown){
                            startPlaying();
                        }
                    });

                    const stopPlaying = () => {
                        event.preventDefault();
                        synth.stopChord(note.freq, currChord);
                        button.classList.remove('playing');
                    }

                    button.addEventListener('pointerup', (event) => {
                        event.preventDefault();
                        stopPlaying();
                        pointerDown = false;
                    });

                    button.addEventListener('pointercancel', stopPlaying);
                    button.addEventListener('pointerleave', (stopPlaying));

                    if(row == 'top'){
                        accContainer.appendChild(button);
                    }else{
                        natContainer.appendChild(button);
                    }
                }
            })
        }

        buildKeyboard(natNotes, 'bottom');
        buildKeyboard(accNotes, 'top');

        chordKeys.forEach(chord => {
            const button = document.createElement('button');
            button.innerText = chord;
            button.className = "chordButton";

            button.addEventListener('pointerdown', (event) => {
                document.querySelectorAll('.chordButton').forEach(btn  => btn.classList.remove('active'));

                baseChord = chord;
                button.classList.add('active');

                changeVoicing();
            })

            chordContainer.appendChild(button);
        });

        let open = false;
        const openbtn = document.querySelector(".openbtn");
        openbtn.addEventListener("click", () => {
            event.preventDefault();
            open = !open;
            if(open){
                document.getElementById("mySidebar").style.transform = "translateX(0%)";
            }
            else{
                document.getElementById("mySidebar").style.transform = "translateX(-100%)";
            }
        })

        function changeVoicing(){
            document.querySelectorAll('.noteButton').forEach(btn => {
                currChord = voicings[baseChord][currVoicing] || voicings[baseChord].first;
                if (btn.classList.contains('playing')){
                    synth.stopChord(btn.id, synth.currChord);
                    synth.startChord(btn.id, currChord);
                }
            });
        }

        function updateVoicing(){
            if(voiceVal < 1/totalVoicings){
                currVoicing = 'first';
            }else if (voiceVal >= 1/totalVoicings && voiceVal < 2/totalVoicings){
                currVoicing = 'second';
            }else if (voiceVal >= 2/totalVoicings && voiceVal < 3/totalVoicings){
                currVoicing = 'third';
            }
        }
    
    </script>
</html>
