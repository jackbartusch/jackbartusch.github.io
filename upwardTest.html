<!DOCTYPE html>
<html>
    <head>
        <title>Audio Effects: OTT</title>
        <meta name = "viewport" content = "width=device-width, initial-scale = 1.0">
    </head>
    <link rel="stylesheet" href="audioTest.css">

    <div class="navBar">
        <ul>
            <li><a href="audioTest.html">erosion</a></li>
            <li><a href="OTT.html">ott</a></li>
            <li><a class="active" href="upwardTest.html">upwardTest</a></li>
        </ul>
    </div>

    <div class="sliderBody">
        <div class="three-slider">
            <div class="slider-container">
                <input type="range" id="dryWet" min="0" max="1" value="1" step="0.01" class="vertical-slider"/>
                <div class="slider-info">
                    <span class="slider-label">mix</span>
                    <output id="mix-val" class="slider-label">100%</output>
                </div>
            </div>
            <div class="slider-container">
                <input type="range" id="amp" min="0" max="0.01" value="0.002" step="0.00005" class="vertical-slider"/>
                <div class="slider-info">
                    <span class="slider-label">amplitude</span>
                    <output id="amp-val" class="slider-label">20%</output>
                </div>
            </div>
            <div class="slider-container">
                <input type="range" id="freq" min="2000" max="19000" value="10000" step="10" class="vertical-slider"/>
                <div class="slider-info">
                    <span class="slider-label">frequency</span>
                    <output id="freq-val" class="slider-label">10000 hz</output>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        const audioContext = new AudioContext();
        await audioContext.audioWorklet.addModule("upward-compressor-processor.js");
        const loopStart = 13.646;
        const loopEnd = 27.35;

        let sourceNode;
        let audioBuffer;

        async function loadAudio() {
            const response = await fetch("https://raw.githubusercontent.com/jackbartusch/audioTest/main/kick_loop.mp3");
            const arrayBuffer = await response.arrayBuffer();
            audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
            console.log("Audio Loaded and Decoded");
        }

        loadAudio();

        function startLoop(){
            sourceNode = audioContext.createBufferSource();
            sourceNode.buffer = audioBuffer;

            sourceNode.loop = true;
            sourceNode.loopStart = loopStart;
            sourceNode.loopEnd = loopEnd;

            sourceNode.connect(upwardNode);

            sourceNode.start(0, 0);
        }

        let hasStarted = false;
        document.addEventListener("click", () => {
            if (audioContext.state === "suspended") {
                audioContext.resume();
            }

            if(!hasStarted)
            {
                startLoop();
                hasStarted = true;
            }
        });

        const inGainNode = audioContext.createGain();
        const upwardNode = new AudioWorkletNode(audioContext, "upward-compressor-processor");
        upwardNode.parameters.get("threshold").value = -40;
        upwardNode.parameters.get("ratio").value = 4;
        inGainNode.connect(audioContext.destination);
        inGainNode.gain.value = 1;
        upwardNode.connect(inGainNode);

    </script>

</html>
